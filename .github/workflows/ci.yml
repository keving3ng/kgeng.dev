name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per PR/branch; cancel older runs when a new commit is pushed (saves minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build, lint, and test
        run: npm run check
